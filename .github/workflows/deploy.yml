name: Build audio & deploy Revanche
on:
  push: { branches: [main] }
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install Piper + ffmpeg
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          pip install piper-tts
      - name: Cache voice model
        uses: actions/cache@v4
        with:
          path: ~/.local/share/piper
          key: piper-fr-siwis-medium
      - name: Generate sentence audio
        run: python pipeline/generate_audio.py
      - name: Cache generated audio between runs
        uses: actions/cache@v4
        with:
          path: packs/audio
          key: revanche-audio-${{ hashFiles('packs/*.json') }}
          restore-keys: revanche-audio-
      - uses: actions/upload-pages-artifact@v3
        with: { path: "." }
      - uses: actions/deploy-pages@v4
