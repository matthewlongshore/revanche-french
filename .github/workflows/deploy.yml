name: Build audio & deploy Revanche
on:
  push: { branches: [main] }
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # 06:00 — Dakar is UTC+0, so this is 6 AM local.

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # On scheduled/manual runs, turn new captures (from Convex) into a pack and commit it.
      - name: Process new captures → pack
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CAPTURE_SECRET: ${{ secrets.CAPTURE_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/build-captures-pack.mjs
      - name: Mine latest podcast episode → pack
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/build-episode-pack.mjs
      - name: Commit new pack (if any)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if ! git diff --quiet -- packs; then
            git config user.name  "revanche-bot"
            git config user.email "actions@users.noreply.github.com"
            git add packs
            git commit -m "Auto: captures → pack ($(date -u +%F))"
            git push
          else
            echo "No new captures to commit."
          fi
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install Piper + ffmpeg
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          pip install piper-tts
      - name: Cache voice models
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/voices
          key: piper-voices-fr-siwis-en-ryan-high-v1
      - name: Download voice models (French + English)
        run: |
          V="${{ runner.temp }}/voices"
          mkdir -p "$V"
          hf="https://huggingface.co/rhasspy/piper-voices/resolve/main"
          if [ ! -f "$V/fr_FR-siwis-medium.onnx" ]; then
            fr="$hf/fr/fr_FR/siwis/medium/fr_FR-siwis-medium.onnx"
            curl -fL -o "$V/fr_FR-siwis-medium.onnx"      "$fr"
            curl -fL -o "$V/fr_FR-siwis-medium.onnx.json" "$fr.json"
          fi
          if [ ! -f "$V/en_US-ryan-high.onnx" ]; then
            en="$hf/en/en_US/ryan/high/en_US-ryan-high.onnx"
            curl -fL -o "$V/en_US-ryan-high.onnx"      "$en"
            curl -fL -o "$V/en_US-ryan-high.onnx.json" "$en.json"
          fi
      - name: Generate sentence audio (FR + EN)
        continue-on-error: true   # never let an audio hiccup block the app deploy
        env:
          PIPER_VOICE: ${{ runner.temp }}/voices/fr_FR-siwis-medium.onnx
          PIPER_VOICE_EN: ${{ runner.temp }}/voices/en_US-ryan-high.onnx
        run: python pipeline/generate_audio.py
      - name: Cache generated audio between runs
        uses: actions/cache@v4
        with:
          path: packs/audio
          key: revanche-audio-ryanhigh-${{ hashFiles('packs/*.json') }}
          restore-keys: revanche-audio-ryanhigh-
      - uses: actions/upload-pages-artifact@v3
        with: { path: "." }
      - uses: actions/deploy-pages@v4
